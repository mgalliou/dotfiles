set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g focus-events on
set -g monitor-activity on
set -g mouse on
# vi modes are enabled if $EDITOR contains "vi"

# Undercurl support
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm' 
# Undercurl colors support
set -as terminal-overrides ',*:Setulc=\E[58::2::::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# vim style pane resizing
bind-key -r C-h resize-pane -L
bind-key -r C-j resize-pane -D
bind-key -r C-k resize-pane -U
bind-key -r C-l resize-pane -R

# Split pane and create new window with current pane working directory
bind-key '"' split-window -c "#{pane_current_path}"
bind-key '%' split-window -h -c "#{pane_current_path}"
bind-key c new-window -c "#{pane_current_path}"

# prefix+[1-9] selects existing window, creates one if it doesn't exist
run '
for i in $(seq 1 9); do
  tmux bind-key "$i" if-shell "tmux select-window -t :$i" "" "new-window -t :$i -c \"#{pane_current_path}\""
done
'

bind-key N command-prompt -p "New Session:" "new-session -A -s '%%'"
bind-key X kill-session
bind-key P display-popup -E -h 80% -w 80% "rmpc"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'vaaleyard/tmux-dotbar'

set -g @tmux-dotbar-bg "black"
set -g @tmux-dotbar-fg "brightblack"
set -g @tmux-dotbar-fg-current "white"
set -g @tmux-dotbar-fg-session "brightblack"
set -g @tmux-dotbar-fg-prefix "cyan"
set -g pane-border-style "fg=brightblack,bg=black"
set -g pane-active-border-style "fg=white,bg=black"
set -g pane-border-indicators arrows
set -g pane-border-lines heavy

# Auto install TPM and plugins
if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

run '~/.config/tmux/plugins/tpm/tpm'
